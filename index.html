<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; }
        .grid-bancos { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .banco-card { 
            background: white; 
            border-radius: 12px; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            height: 140px;
        }
        .banco-card:hover { transform: translateY(-5px); }
        .banco-card img { 
            max-width: 80%; 
            max-height: 70px; 
            object-fit: contain; 
        }
        .banco-nombre { margin-top: 10px; font-size: 14px; font-weight: bold; color: #333; text-align: center; }
    </style>
</head>
<body>

<h1 style="text-align: center; color: #1a365d; margin-bottom: 30px;">Bancos de Bolivia</h1>

<div class="grid-bancos">

    <div class="banco-card">
        <img src="[attachment_3](attachment)" alt="Banco Unión">
        <div class="banco-nombre">Banco Unión</div>
    </div>

    <div class="banco-card">
        <img src="[attachment_1](attachment)" alt="Banco Mercantil Santa Cruz">
        <div class="banco-nombre">Mercantil Santa Cruz</div>
    </div>

    <div class="banco-card">
        <img src="[attachment_2](attachment)" alt="BNB">
        <div class="banco-nombre">BNB</div>
    </div>

    <div class="banco-card">
        <img src="[attachment_4](attachment)" alt="Banco BISA">
        <div class="banco-nombre">Banco BISA</div>
    </div>

    <div class="banco-card">
        <img src="[attachment_5](attachment)" alt="Banco Ganadero">
        <div class="banco-nombre">Banco Ganadero</div>
    </div>

    <div class="banco-card">
        <img src="[attachment_7](attachment)" alt="Banco Económico">
        <div class="banco-nombre">Banco Económico</div>
    </div>

    <div class="banco-card">
        <img src="[attachment_6](attachment)" alt="BCP">
        <div class="banco-nombre">BCP</div>
    </div>

    <div class="banco-card">
        <img src="[attachment_0](attachment)" alt="BancoSol">
        <div class="banco-nombre">BancoSol</div>
    </div>

    <div class="banco-card">
        <img src="[attachment_9](attachment)" alt="Banco Fortaleza">
        <div class="banco-nombre">Banco Fortaleza</div>
    </div>

    <div class="banco-card">
        <img src="[attachment_8](attachment)" alt="Banco FIE">
        <div class="banco-nombre">Banco FIE</div>
    </div>

</div>

</body>
</html>
