<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Fiestas Patrias - FULL CELL CALAMA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        :root { 
            /* --- COLORES FIESTAS PATRIAS 🇨🇱 --- */
            --chile-azul: #0033a0; /* Azul bandera */
            --chile-rojo: #da291c; /* Rojo bandera */
            --fondo: #f8fafc;
            --borde: #e2e8f0;
        }
        body { background-color: var(--fondo); font-family: 'Inter', system-ui, sans-serif; color: #334155; margin: 0; padding: 0;}
        
        /* Encabezado Principal Dieciochero */
        .header-app { 
            background: white; 
            padding: 1.8rem 0; 
            border-bottom: 4px solid var(--chile-rojo); /* Línea roja inferior tipo bandera */
            border-top: 4px solid var(--chile-azul);    /* Línea azul superior */
        }
        .brand-title { font-weight: 900; letter-spacing: -1px; color: var(--chile-azul); font-size: 2.2rem; text-align: center; margin-bottom: 0;}
        .subtitle { font-size: 0.8rem; text-align: center; color: var(--chile-rojo); font-weight: 800; letter-spacing: 1.5px; margin-top: 4px;}
        
        /* Barra de Búsqueda Flotante */
        .sticky-search-wrapper {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(248, 250, 252, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 0;
            border-bottom: 1px solid rgba(218, 41, 28, 0.2); /* Sombra roja sutil */
            box-shadow: 0 4px 10px -2px rgba(0, 51, 160, 0.1);
            margin-bottom: 20px;
        }

        .search-container { max-width: 900px; margin: 0 auto; padding: 0 15px; }
        .search-bar { 
            border-radius: 10px; 
            border: 2px solid var(--chile-azul); 
            padding: 12px 20px; 
            font-size: 1rem; 
            width: 100%;
            transition: 0.2s;
            background: white;
        }
        .search-bar:focus { border-color: var(--chile-rojo); box-shadow: 0 0 0 3px rgba(218, 41, 28, 0.15); outline: none; }

        /* Cabecera de listado (Solo PC) */
        .list-header { 
            display: flex; 
            padding: 8px 20px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: var(--chile-azul); 
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--chile-azul);
            margin-bottom: 10px;
        }
        .list-icon { font-size: 1rem; margin-right: 4px; }

        /* Fila de producto */
        .item-row { 
            background: white; 
            border-radius: 8px; 
            padding: 15px 20px; 
            margin-bottom: 8px; 
            border: 1px solid var(--borde);
            border-left: 4px solid var(--chile-azul); /* Detalle azul en cada tarjeta */
            display: flex;
            align-items: center;
            transition: 0.15s;
        }
        .item-row:hover { border-color: var(--chile-azul); box-shadow: 0 4px 8px rgba(0,0,0,0.08); transform: translateY(-1px); }

        /* Estados de Stock */
        .no-stock { background-color: #fff1f2 !important; border-color: #fecdd3 !important; border-left-color: var(--chile-rojo) !important; opacity: 0.9;}
        .badge-agotado { background: var(--chile-rojo); color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
        .badge-stock { background: #eff6ff; color: var(--chile-azul); padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; border: 1px solid #bfdbfe; }

        /* Sistema de Columnas Base (PC) */
        .col-main { flex: 2.5; }
        .col-desc { flex: 4; padding: 0 15px; } 
        .col-footer { flex: 3; display: flex; align-items: center; } 
        .col-stock { flex: 1; text-align: center; }
        .col-price { flex: 1; text-align: right; }

        /* Tipografía */
        .badge-brand { 
            background: #f1f5f9; color: #334155; 
            font-size: 0.65rem; font-weight: 800; 
            padding: 2px 6px; border-radius: 4px; 
            text-transform: uppercase; margin-right: 5px;
        }
        .product-sku { font-size: 0.65rem; color: #64748b; font-family: monospace; font-weight: 600;}
        .item-name { font-weight: 800; font-size: 1.05rem; color: #0f172a; display: block; line-height: 1.2; margin-top: 4px; }
        .item-desc { font-size: 0.85rem; color: #475569; margin: 0; line-height: 1.3; }
        .price-text { font-size: 1.3rem; font-weight: 900; color: var(--chile-rojo); } /* Precios en rojo para destacar */

        .status-msg { text-align: center; padding: 30px; font-size: 1rem; color: #64748b; font-weight: 600;}

        /* --- OPTIMIZACIÓN PARA MÓVILES --- */
        @media (max-width: 992px) {
            .header-app { padding: 1.2rem 0; }
            .brand-title { font-size: 1.8rem; }
            .sticky-search-wrapper { padding: 10px 0; margin-bottom: 15px; }
            .search-bar { padding: 10px 15px; font-size: 0.95rem; }
            
            .list-header { display: none; }
            
            .item-row { flex-direction: column; align-items: flex-start; padding: 12px 15px; gap: 6px; }
            .col-main { width: 100%; }
            .col-desc { width: 100%; padding: 0; }
            .item-name { font-size: 1rem; } 
            .item-desc { font-size: 0.8rem; }
            
            .col-footer { 
                width: 100%; 
                display: flex; 
                justify-content: space-between; 
                align-items: center; 
                border-top: 1px dashed var(--borde); 
                padding-top: 8px; 
                margin-top: 4px; 
            }
            .col-stock, .col-price { text-align: left; }
            .col-price { text-align: right; }
        }
    </style>
</head>
<body>

<header class="header-app">
    <div class="container">
        <h1 class="brand-title">🇨🇱 FULL CELL CALAMA 🇨🇱</h1>
        <p class="subtitle mb-0">SISTEMA DE INVENTARIO - EDICIÓN FIESTAS PATRIAS 🥟🪁</p>
    </div>
</header>

<div class="sticky-search-wrapper">
    <div class="container search-container">
        <input type="text" id="searchInput" class="form-control search-bar shadow-sm" placeholder="🔍 Buscar código o repuesto (¡Viva Chile!)..." autocomplete="off">
    </div>
</div>

<main class="container mb-5" style="max-width: 1000px;">
    <div class="list-header d-none d-lg-flex">
        <div class="col-main"><span class="list-icon">⭐</span> Modelo / Referencia</div>
        <div class="col-desc"><span class="list-icon">🪁</span> Detalle Técnico</div>
        <div class="col-footer">
            <div class="col-stock"><span class="list-icon">📦</span> Disponibilidad</div>
            <div class="col-price"><span class="list-icon">🇨🇱</span> Precio Neto</div>
        </div>
    </div>

    <div id="inventoryList">
        <div class="status-msg">⏳ Preparando la parrilla de datos...</div>
    </div>
</main>

<script>
    // Tu enlace intacto
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSs_mhwS-Op3r7iDRB3UZutQc8m5_oe5uDUqHzwbLOmHcsOm6uPtm_nYVQgwb9t1tjIWZ2waAnRlTJA/pub?output=csv'; 

    let inventory = [];

    function loadInventory() {
        Papa.parse(SHEET_CSV, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                const filas = results.data.slice(1);
                
                inventory = filas.map(c => {
                    return {
                        codigo: c[0] ? c[0].trim() : 'S/N',
                        nombre: c[1] ? c[1].trim() : 'Producto sin nombre',
                        precio: c[2] ? c[2].trim() : '$0',
                        desc: c[3] ? c[3].trim() : '-',
                        marca: c[4] ? c[4].trim() : '',
                        stock: parseInt(c[5]) || 0
                    };
                }).filter(item => item.nombre !== 'Producto sin nombre' && item.nombre !== '');

                render(inventory);
            },
            error: function(error) {
                document.getElementById('inventoryList').innerHTML = `<div class="status-msg" style="color: var(--chile-rojo);">❌ Pucha, hubo un error leyendo el archivo.</div>`;
            }
        });
    }

    function render(list) {
        const container = document.getElementById('inventoryList');
        if (list.length === 0) {
            container.innerHTML = `<div class="status-msg">No se encontraron artículos con esa búsqueda.</div>`;
            return;
        }

        container.innerHTML = list.map(item => {
            const hasStock = item.stock > 0;
            return `
                <div class="item-row ${!hasStock ? 'no-stock' : ''}">
                    
                    <div class="col-main">
                        <div style="display: flex; align-items: center; margin-bottom: 2px;">
                            ${item.marca ? `<span class="badge-brand">${item.marca}</span>` : ''}
                            <span class="product-sku">REF: ${item.codigo}</span>
                        </div>
                        <span class="item-name">${item.nombre}</span>
                    </div>

                    <div class="col-desc">
                        <p class="item-desc">${item.desc}</p>
                    </div>

                    <div class="col-footer">
                        <div class="col-stock">
                            <span class="${hasStock ? 'badge-stock' : 'badge-agotado'}">
                                ${hasStock ? item.stock + ' UNID' : 'AGOTADO'}
                            </span>
                        </div>
                        <div class="col-price">
                            <span class="price-text">${item.precio}</span>
                        </div>
                    </div>

                </div>
            `;
        }).join('');
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase().trim();
        const filtered = inventory.filter(i => 
            i.nombre.toLowerCase().includes(term) || 
            i.codigo.toLowerCase().includes(term) ||
            i.desc.toLowerCase().includes(term) ||
            i.marca.toLowerCase().includes(term)
        );
        render(filtered);
    });

    loadInventory();
</script>

</body>
</html>
