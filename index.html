<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melamina Pro Engine - Visualizador 2D</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #10b981; --text: #f8fafc; --border: #334155;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 400px 1fr; gap: 20px; }
        .panel { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        h1, h2 { color: var(--primary); margin-top: 0; }
        
        /* Configuración de Plancha */
        .sheet-config { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--primary); }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 6px; }

        /* Lista de Muebles */
        .catalog-list { max-height: 400px; overflow-y: auto; margin-top: 15px; }
        .catalog-list::-webkit-scrollbar { width: 8px; }
        .catalog-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .mueble-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .mueble-item:hover { background: rgba(16, 185, 129, 0.1); }
        .mueble-item.active { border-left: 4px solid var(--primary); background: rgba(16, 185, 129, 0.2); }

        /* Visualizador 2D */
        .canvas-container { text-align: center; background: #000; border-radius: 8px; padding: 20px; min-height: 500px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { background: #222; border: 2px solid #444; max-width: 100%; height: auto; }
        .stats { display: flex; justify-content: space-around; margin-top: 20px; width: 100%; }
        .stat-box { text-align: center; padding: 10px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); flex: 1; margin: 0 10px; }
    </style>
</head>
<body>

    <header style="text-align:center; margin-bottom:30px;">
        <h1>Melamina Pro Engine</h1>
        <p>Sincronización con Google Sheets & Visualización Técnica 2D</p>
    </header>

    <div class="container">
        <aside class="panel">
            <div class="sheet-config">
                <h3 style="font-size: 0.9rem; margin-bottom: 10px; color: var(--primary);">CONFIGURACIÓN DE PLANCHA</h3>
                <div class="input-group">
                    <label>Ancho Plancha (mm)</label>
                    <input type="number" id="p_ancho" value="2440" onchange="dibujarCortes()">
                </div>
                <div class="input-group">
                    <label>Largo Plancha (mm)</label>
                    <input type="number" id="p_largo" value="1830" onchange="dibujarCortes()">
                </div>
            </div>

            <h2>Catálogo Externo</h2>
            <div id="status-sheet" style="font-size: 0.8rem; color: #f59e0b;">⏳ Conectando con Google Sheets...</div>
            <div class="catalog-list" id="lista_muebles">
                </div>
        </aside>

        <main class="panel">
            <h2>Esquema Técnico de Despiece (2D)</h2>
            <div class="canvas-container">
                <canvas id="canvas_2d" width="800" height="600"></canvas>
                
                <div class="stats">
                    <div class="stat-box">
                        <label>Mueble Actual</label>
                        <div id="mueble_nombre" style="font-weight:bold; color:var(--text);">Ninguno</div>
                    </div>
                    <div class="stat-box">
                        <label>Ocupación Estimada</label>
                        <div id="eficiencia" style="font-weight:bold; color:var(--primary);">0%</div>
                    </div>
                    <div class="stat-box">
                        <label>Piezas Mayores</label>
                        <div id="total_piezas" style="font-weight:bold; color:var(--text);">0</div>
                    </div>
                </div>
            </div>

            <div style="margin-top:20px;">
                <table style="width:100%; border-collapse: collapse; font-size: 0.85rem;">
                    <thead><tr style="text-align:left; color:#94a3b8; border-bottom:1px solid var(--border);"><th>PIEZA</th><th>CANTIDAD</th><th>MEDIDA DE CORTE (mm)</th></tr></thead>
                    <tbody id="detalles_corte"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // =====================================================================
        // ENLACE CSV INTEGRADO AUTOMÁTICAMENTE:
        const URL_SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLzyFrSoKL9fpEDOaL6qHanGggJGgDuuPqVlDVZS3rpaA1TTAaCLODxK6UMT25Ydr0Z7X7VL13I602/pub?output=csv";
        // =====================================================================

        let mueblesData = [];
        let muebleSeleccionado = null;

        async function cargarDatos() {
            if (URL_SHEET === "PEGAR_AQUÍ_EL_LINK_CSV_DE_GOOGLE_SHEETS" || URL_SHEET === "") {
                document.getElementById('status-sheet').innerHTML = "⚠️ <b>Falta el enlace:</b> Abre el archivo HTML con Bloc de Notas, pega tu enlace en la línea 90 y guarda los cambios.";
                document.getElementById('status-sheet').style.color = "#f43f5e";
                return;
            }

            try {
                const response = await fetch(URL_SHEET);
                const data = await response.text();
                
                // Procesar CSV a objeto JSON
                const filas = data.split("\\n").filter(f => f.trim() !== "").slice(1); // Omitir encabezado y líneas vacías
                
                mueblesData = filas.map(f => {
                    // Manejar posible retorno de carro al final de la línea (\r)
                    const lineaLimpia = f.replace('\\r', '');
                    const c = lineaLimpia.split(",");
                    if(c.length >= 7) {
                        return { 
                            id: c[0].trim(), 
                            nombre: c[1].trim(), 
                            cat: c[2].trim(), 
                            H: parseFloat(c[3]), 
                            W: parseFloat(c[4]), 
                            D: parseFloat(c[5]), 
                            E: parseFloat(c[6]) 
                        };
                    }
                    return null;
                }).filter(m => m !== null);

                document.getElementById('status-sheet').innerText = "✅ Sincronizado con Google Sheets (" + mueblesData.length + " modelos)";
                document.getElementById('status-sheet').style.color = "var(--primary)";
                renderizarLista();
            } catch (e) {
                document.getElementById('status-sheet').innerText = "⚠️ Error de conexión. Verifica que el enlace está correcto y tienes internet.";
                document.getElementById('status-sheet').style.color = "#f43f5e";
                console.error("Error al cargar Google Sheets:", e);
            }
        }

        function renderizarLista() {
            const list = document.getElementById('lista_muebles');
            list.innerHTML = mueblesData.map(m => `
                <div class="mueble-item" id="item_${m.id}" onclick="seleccionarMueble('${m.id}')">
                    <strong style="color:var(--text);">${m.nombre}</strong><br>
                    <span style="font-size:0.75rem; color:#94a3b8;">Categoría: ${m.cat} | Medidas: ${m.H} x ${m.W} x ${m.D}</span>
                </div>
            `).join('');

            // Seleccionar el primero por defecto
            if(mueblesData.length > 0) seleccionarMueble(mueblesData[0].id);
        }

        function seleccionarMueble(id) {
            muebleSeleccionado = mueblesData.find(m => m.id === id);
            
            // Efecto visual de selección
            document.querySelectorAll('.mueble-item').forEach(el => el.classList.remove('active'));
            const elemento = document.getElementById('item_' + id);
            if (elemento) elemento.classList.add('active');
            
            document.getElementById('mueble_nombre').innerText = muebleSeleccionado.nombre;
            dibujarCortes();
        }

        function dibujarCortes() {
            if (!muebleSeleccionado) return;

            const canvas = document.getElementById('canvas_2d');
            const ctx = canvas.getContext('2d');
            
            // Asegurar que las medidas del canvas se adaptan
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 40;
            
            const pW = parseFloat(document.getElementById('p_ancho').value);
            const pL = parseFloat(document.getElementById('p_largo').value);
            const E = muebleSeleccionado.E;

            // Escala para ajustar la plancha dentro del canvas
            const scale = Math.min(canvas.width / pW, canvas.height / pL) * 0.85;
            const offsetX = (canvas.width - pW * scale) / 2;
            const offsetY = (canvas.height - pL * scale) / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Dibujar el fondo de la Hoja de Melamina
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(offsetX, offsetY, pW * scale, pL * scale);
            ctx.strokeStyle = "#10b981"; // Borde verde neón
            ctx.lineWidth = 2;
            ctx.strokeRect(offsetX, offsetY, pW * scale, pL * scale);
            
            // Texto de formato de plancha
            ctx.fillStyle = "#94a3b8";
            ctx.font = "12px Arial";
            ctx.fillText(`Formato Plancha: ${pW}mm x ${pL}mm`, offsetX, offsetY - 10);

            // 2. Generar el Despiece Básico Estructural
            const piezas = [
                { n: "Lateral Izquierdo", w: muebleSeleccionado.H, l: muebleSeleccionado.D },
                { n: "Lateral Derecho", w: muebleSeleccionado.H, l: muebleSeleccionado.D },
                { n: "Base Inferior", w: muebleSeleccionado.W - (2*E), l: muebleSeleccionado.D },
                { n: "Techo / Cubierta", w: muebleSeleccionado.W - (2*E), l: muebleSeleccionado.D }
            ];

            let posX = offsetX + 10;
            let posY = offsetY + 10;
            let tableHTML = '';
            let areaCortes = 0;
            let alturaMaximaFila = 0;

            // 3. Dibujar las piezas sobre la plancha
            piezas.forEach((p) => {
                const drawW = p.w * scale;
                const drawL = p.l * scale;

                // Salto de línea si la pieza se sale del ancho de la plancha
                if (posX + drawW > offsetX + (pW * scale) - 10) { 
                    posX = offsetX + 10; 
                    posY += alturaMaximaFila + 15; 
                    alturaMaximaFila = 0; 
                }

                // Dibujar el rectángulo de corte
                ctx.fillStyle = "rgba(16, 185, 129, 0.4)";
                ctx.fillRect(posX, posY, drawW, drawL);
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 1.5;
                ctx.strokeRect(posX, posY, drawW, drawL);
                
                // Etiqueta de la pieza (Si cabe)
                if (drawW > 50 && drawL > 20) {
                    ctx.fillStyle = "white";
                    ctx.font = "11px Arial";
                    ctx.fillText(p.n, posX + 5, posY + 15);
                }

                // Registrar en la tabla y sumar área
                areaCortes += (p.w * p.l);
                tableHTML += `<tr style="border-bottom:1px solid #334155;">
                                <td style="color:#f8fafc; font-weight:600;">${p.n}</td>
                                <td style="text-align:center;">1</td>
                                <td style="font-family: monospace; color:#10b981;">${p.w} x ${p.l}</td>
                              </tr>`;
                
                posX += drawW + 15; // Espacio que simula el grosor del disco de sierra (aprox)
                if (drawL > alturaMaximaFila) alturaMaximaFila = drawL;
            });

            // 4. Actualizar las estadísticas de la interfaz
            document.getElementById('detalles_corte').innerHTML = tableHTML;
            document.getElementById('total_piezas').innerText = piezas.length;
            
            const eficienciaPorcentaje = ((areaCortes / (pW * pL)) * 100).toFixed(1);
            document.getElementById('eficiencia').innerText = eficienciaPorcentaje + "%";
            
            if (eficienciaPorcentaje > 80) {
                document.getElementById('eficiencia').style.color = "#ef4444"; // Rojo si está muy llena
            } else {
                document.getElementById('eficiencia').style.color = "#10b981"; // Verde normal
            }
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
